<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Edge gradients: node-to-node color transitions (the "Diff" concept) -->
    <linearGradient id="g-rb" x1="128" y1="34" x2="40" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#CB3C33"/>
      <stop offset="100%" stop-color="#4063D8"/>
    </linearGradient>
    <linearGradient id="g-bp" x1="40" y1="120" x2="216" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4063D8"/>
      <stop offset="100%" stop-color="#9558B2"/>
    </linearGradient>
    <linearGradient id="g-pg" x1="216" y1="120" x2="128" y2="193" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9558B2"/>
      <stop offset="100%" stop-color="#389826"/>
    </linearGradient>

    <!-- Node shadow -->
    <filter id="ns" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Badge background -->
  <circle cx="128" cy="120" r="106" fill="white" stroke="#2d2d2d" stroke-width="2.5"/>

  <!-- Inner decorative ring -->
  <circle cx="128" cy="120" r="92" fill="none" stroke="#e0e0e0" stroke-width="0.75"/>

  <!-- Watermark partial derivative symbol -->
  <text x="128" y="136" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-size="108"
        fill="#eaeaea" font-style="italic" pointer-events="none">&#x2202;</text>

  <!-- Network edges: gray (base topology) -->
  <g stroke="#b8b8b8" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="128" y1="34" x2="216" y2="120"/>
    <line x1="40" y1="120" x2="128" y2="193"/>
    <line x1="128" y1="34" x2="128" y2="193"/>
  </g>

  <!-- Network edges: gradient (sensitivity / differentiation flow) -->
  <g stroke-width="3.5" stroke-linecap="round" fill="none">
    <line x1="128" y1="34" x2="40" y2="120" stroke="url(#g-rb)"/>
    <line x1="40" y1="120" x2="216" y2="120" stroke="url(#g-bp)"/>
    <line x1="216" y1="120" x2="128" y2="193" stroke="url(#g-pg)"/>
  </g>

  <!-- Bus nodes (Julia official colors) -->
  <g filter="url(#ns)">
    <circle cx="128" cy="34" r="16" fill="#CB3C33"/>
    <circle cx="40" cy="120" r="16" fill="#4063D8"/>
    <circle cx="216" cy="120" r="16" fill="#9558B2"/>
    <circle cx="128" cy="193" r="16" fill="#389826"/>
  </g>

  <!-- Glossy highlights on nodes -->
  <g fill="white" opacity="0.30" pointer-events="none">
    <circle cx="122" cy="28" r="5.5"/>
    <circle cx="34" cy="114" r="5.5"/>
    <circle cx="210" cy="114" r="5.5"/>
    <circle cx="122" cy="187" r="5.5"/>
  </g>

</svg>
