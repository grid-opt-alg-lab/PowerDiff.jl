<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Edge gradients: node-to-node color transitions (the "Diff" concept) -->
    <linearGradient id="g-rb" x1="128" y1="34" x2="40" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E05A52"/>
      <stop offset="100%" stop-color="#5A82E6"/>
    </linearGradient>
    <linearGradient id="g-bp" x1="40" y1="120" x2="216" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5A82E6"/>
      <stop offset="100%" stop-color="#B07ACC"/>
    </linearGradient>
    <linearGradient id="g-pg" x1="216" y1="120" x2="128" y2="193" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B07ACC"/>
      <stop offset="100%" stop-color="#4FB838"/>
    </linearGradient>

    <!-- Node glow for dark background -->
    <filter id="ng" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#fff" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Badge background (dark) -->
  <circle cx="128" cy="120" r="106" fill="#1a1a2e" stroke="#555" stroke-width="2"/>

  <!-- Inner decorative ring -->
  <circle cx="128" cy="120" r="92" fill="none" stroke="#333" stroke-width="0.75"/>

  <!-- Watermark partial derivative symbol -->
  <text x="128" y="136" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-size="108"
        fill="#252540" font-style="italic" pointer-events="none">&#x2202;</text>

  <!-- Network edges: muted (base topology) -->
  <g stroke="#444" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="128" y1="34" x2="216" y2="120"/>
    <line x1="40" y1="120" x2="128" y2="193"/>
    <line x1="128" y1="34" x2="128" y2="193"/>
  </g>

  <!-- Network edges: gradient (sensitivity / differentiation flow) -->
  <g stroke-width="3.5" stroke-linecap="round" fill="none">
    <line x1="128" y1="34" x2="40" y2="120" stroke="url(#g-rb)"/>
    <line x1="40" y1="120" x2="216" y2="120" stroke="url(#g-bp)"/>
    <line x1="216" y1="120" x2="128" y2="193" stroke="url(#g-pg)"/>
  </g>

  <!-- Bus nodes (brightened Julia colors for dark bg) -->
  <g filter="url(#ng)">
    <circle cx="128" cy="34" r="16" fill="#E05A52"/>
    <circle cx="40" cy="120" r="16" fill="#5A82E6"/>
    <circle cx="216" cy="120" r="16" fill="#B07ACC"/>
    <circle cx="128" cy="193" r="16" fill="#4FB838"/>
  </g>

  <!-- Glossy highlights on nodes -->
  <g fill="white" opacity="0.22" pointer-events="none">
    <circle cx="122" cy="28" r="5.5"/>
    <circle cx="34" cy="114" r="5.5"/>
    <circle cx="210" cy="114" r="5.5"/>
    <circle cx="122" cy="187" r="5.5"/>
  </g>

</svg>
